<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manipulating Arrays</title>
    <link rel="stylsheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <h1>Arrays Methods Practice</h1>

    <input type="text" id="elementInput" placeholder="Enter Value">
    <input type="number" id="indexInput" placeholder="Index">

    <br><br>

    <button onclick="addLast()">Push (Add Last)</button>
    <button onclick="removeLast()">Pop (Remove Last)</button>
    <button onclick="removeFirst()">Shift (Remove First)</button>
    <button onclick="addFirst()">Unshift (Add First)</button>
    <button onclick="removeAtIndex()">Splice (Remove At Index)</button>

    <h2>Array Elements:</h2>
    <div id="arrayElements"></div>
    
</body>
</html>
